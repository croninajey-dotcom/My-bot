services:
  - type: web
    name: dating-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: dating-db
          property: connectionString

databases:
  - name: dating-db
    plan: free
